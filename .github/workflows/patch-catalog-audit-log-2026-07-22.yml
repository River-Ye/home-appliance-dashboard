name: Patch catalog audit logging

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: patch-catalog-audit-log-2026-07-22
  cancel-in-progress: true

jobs:
  patch:
    name: Capture maintenance audit failures
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout maintenance branch
        uses: actions/checkout@v6
        with:
          ref: codex/2026-07-22-catalog-maintenance
          fetch-depth: 0

      - name: Patch workflow and remove this helper
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow = Path(".github/workflows/catalog-maintenance-2026-07-22.yml")
          text = workflow.read_text()
          old = '''      - name: Audit and update catalog
        env:
          TZ: Asia/Taipei
        run: node tools/.run-catalog-maintenance-2026-07-22.js

      - name: Apply exact-model consistency fixes
'''
          new = '''      - name: Audit and update catalog
        id: audit
        continue-on-error: true
        env:
          TZ: Asia/Taipei
        shell: bash
        run: |
          set -o pipefail
          node tools/.run-catalog-maintenance-2026-07-22.js 2>&1 | tee catalog-maintenance-audit.log

      - name: Preserve audit failure
        if: steps.audit.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY_INNER'
          from pathlib import Path
          payload = Path(".github/maintenance/2026-07-21-script.part00")
          payload.write_text("A" + payload.read_text())
          PY_INNER
          rm -f tools/.run-catalog-maintenance-2026-07-22.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "保存 7 月 22 日商品稽核錯誤"
          git push origin HEAD:codex/2026-07-22-catalog-maintenance
          exit 1

      - name: Apply exact-model consistency fixes
'''
          if old not in text:
              raise SystemExit("audit workflow patch target missing")
          workflow.write_text(text.replace(old, new, 1))
          PY
          rm .github/workflows/patch-catalog-audit-log-2026-07-22.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "記錄商品稽核腳本錯誤"
          git push origin HEAD:codex/2026-07-22-catalog-maintenance
