name: Final README correction

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  correct:
    name: Correct current README summary
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout maintenance branch
        uses: actions/checkout@v6
        with:
          ref: codex/2026-07-22-catalog-maintenance
          fetch-depth: 0

      - name: Correct README and validate docs
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          readme = Path("README.md")
          text = readme.read_text()
          replacements = {
              "純前端靜態頁面，整理 2026-07-21 查核的家電推薦清單": "純前端靜態頁面，整理 2026-07-22 查核的家電推薦清單",
              "不為 666 筆商品建立重複、薄內容的獨立頁面": "不為 668 筆商品建立重複、薄內容的獨立頁面",
          }
          for before, after in replacements.items():
              if before not in text and after not in text:
                  raise SystemExit(f"README marker missing: {before}")
              text = text.replace(before, after, 1)
          readme.write_text(text)
          PY
          node tools/check-docs.js
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "修正 7 月 22 日 README 摘要"
          git push origin HEAD:codex/2026-07-22-catalog-maintenance
