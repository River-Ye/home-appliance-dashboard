name: Verify deployed Pages 2026-07-22

on:
  push:
    branches:
      - codex/2026-07-22-catalog-maintenance

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    name: Verify production site
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Poll deployed site
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          base_url="https://appliance.riverye.com"
          success=0
          for attempt in $(seq 1 30); do
            cache_key="$(date +%s)-${attempt}"
            if curl -fsSL --max-time 20 -H "Cache-Control: no-cache" "${base_url}/?verify=${cache_key}" -o /tmp/index.html \
              && curl -fsSL --max-time 20 -H "Cache-Control: no-cache" "${base_url}/products/purifier.js?verify=${cache_key}" -o /tmp/purifier.js \
              && curl -fsSL --max-time 20 -H "Cache-Control: no-cache" "${base_url}/products/washerdryer.js?verify=${cache_key}" -o /tmp/washerdryer.js \
              && grep -Fq "2026-07-22" /tmp/index.html \
              && grep -Fq "668" /tmp/index.html \
              && grep -Fq "USD 1 = TWD 32.328" /tmp/index.html \
              && grep -Fq "ap-dyson-hj10" /tmp/purifier.js \
              && grep -Fq "washerdryer-lg-wd-s2220b" /tmp/washerdryer.js; then
              success=1
              break
            fi
            sleep 10
          done

          if [ "$success" -ne 1 ]; then
            echo "Production verification did not reach the expected release." >&2
            exit 1
          fi

          echo "verified_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "Production site contains the 2026-07-22 data date, 668 products, USD/TWD 32.328, Dyson HJ10, and LG WD-S2220B."

      - name: Record successful deployment verification
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          VERIFIED_AT: ${{ steps.verify.outputs.verified_at }}
        run: |
          gh pr comment 2 --repo River-Ye/home-appliance-dashboard --body "✅ GitHub Pages 部署驗證完成（${VERIFIED_AT}）：首頁已顯示 2026-07-22、668 筆商品與 USD 1 = TWD 32.328；Dyson HJ10、LG WD-S2220B 的正式商品資料檔皆可正常載入。"

      - name: Record failed deployment verification
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment 2 --repo River-Ye/home-appliance-dashboard --body "❌ GitHub Pages 部署驗證失敗：在輪詢期間未同時確認 2026-07-22、668 筆商品、USD/TWD 32.328、Dyson HJ10 與 LG WD-S2220B。"
