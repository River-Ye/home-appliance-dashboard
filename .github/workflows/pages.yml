name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install Chromium
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install chromium

      - name: Check syntax
        run: npm run check:syntax

      - name: Check logic
        run: npm run check:logic

      - name: Check data
        run: npm run check:data

      - name: Check docs
        run: npm run check:docs

      - name: Check GEO
        run: npm run check:geo

      - name: Check UI
        run: npm run check:ui

      - name: Check Lighthouse quality budgets
        run: npm run check:quality

      - name: Prepare Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp index.html favicon.svg social-preview.png CNAME .nojekyll robots.txt sitemap.xml llms.txt 949a77c30a2a9346e8a7475117ff39b6.txt _site/
          cp release_date_research.json historical_price_research.json dimension_research.json _site/
          cp product_issue_research.json product_issue_report_evidence.json product_issue_review_manifest.json _site/
          cp -R assets products categories _site/
          find _site -name '.DS_Store' -delete

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify IndexNow
        if: steps.deployment.outcome == 'success'
        continue-on-error: true
        timeout-minutes: 1
        run: node tools/submit-indexnow.js
