name: Diagnose catalog audit

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: diagnose-catalog-audit-2026-07-22
  cancel-in-progress: true

jobs:
  diagnose:
    name: Show catalog audit failure tail
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout maintenance branch
        uses: actions/checkout@v6
        with:
          ref: codex/2026-07-22-catalog-maintenance
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Prepare maintenance script from workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          lines = Path(".github/workflows/catalog-maintenance-2026-07-22.yml").read_text().splitlines()
          start = lines.index("          python - <<'PY'") + 1
          end = lines.index("          PY", start)
          code = "\n".join(line[10:] if line.startswith("          ") else line for line in lines[start:end])
          exec(compile(code, "prepare-maintenance-script.py", "exec"))
          PY

      - name: Install dependencies quietly
        shell: bash
        run: |
          if ! npm ci > /tmp/npm-ci.log 2>&1; then
            tail -n 100 /tmp/npm-ci.log
            exit 1
          fi

      - name: Show audit failure
        env:
          TZ: Asia/Taipei
        shell: bash
        run: |
          set +e
          node tools/.run-catalog-maintenance-2026-07-22.js > /tmp/catalog-audit.log 2>&1
          status=$?
          tail -n 120 /tmp/catalog-audit.log
          exit "$status"
