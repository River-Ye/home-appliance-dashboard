name: Run catalog maintenance 2026-07-21

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: catalog-maintenance-2026-07-21
  cancel-in-progress: true

jobs:
  maintain:
    name: Audit, update, validate, and commit
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout maintenance branch
        uses: actions/checkout@v6
        with:
          ref: codex/2026-07-21-catalog-maintenance
          fetch-depth: 0
          show-progress: false

      - name: Recover and verify maintenance script
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import hashlib

          parts = sorted(Path(".github/maintenance").glob("2026-07-21-script.part*"))
          if len(parts) != 7:
              raise SystemExit(f"expected 7 script parts, found {len(parts)}")

          first = parts[0].read_text()
          tail = "".join(part.read_text() for part in parts[1:])
          expected_original = "db6d4a01cca4951f36ba3ecc12cff2ff6fd448fa3d1e56849d9faa5b2e8422e6"
          matches = []
          for index in range(len(first)):
              corrected = first[:index] + first[index + 1:]
              try:
                  decoded = gzip.decompress(base64.b64decode(corrected + tail, validate=True))
              except Exception:
                  continue
              if hashlib.sha256(decoded).hexdigest() == expected_original:
                  matches.append((index, first[index], corrected, decoded))

          if len(matches) != 1:
              raise SystemExit(f"expected exactly one recoverable extra character, found {len(matches)}")

          index, removed, corrected, decoded = matches[0]
          parts[0].write_text(corrected)
          script_path = Path("tools/.run-catalog-maintenance-2026-07-21.js")
          script_path.write_bytes(decoded)
          print(f"recovered part00 by removing index={index}, character={removed!r}")

          text = script_path.read_text()
          old = '    historicalLow: historicalNotFound("TWD", "已查 Dyson 台灣官方單機頁、PChome exact-model 單機頁與公開上市資料；NT$12,900 可驗證為本輪現行促銷價，但缺少可重現的長期價格曲線，且已排除兩入組、搭售組合與濾網組，因此不把現價直接宣稱為歷史最低價。"),'
          new = '''    historicalLow: {
                status: "found",
                amount: 10900,
                currency: "TWD",
                converted: 10900,
                sourceUrl: "https://shop.dyson.tw/promotions/latest-offers/latest-offers",
                sourceTitle: "Dyson 台灣官方最新優惠：HJ10 單機首降四千",
                evidenceSnippet: "Dyson 台灣官方優惠頁明示 2026/6/17-6/23，HJ10 銀白色單機優惠不含贈品，原價 NT$14,900、特價 NT$10,900。",
                sourceKind: "official_sale",
                confidence: "high",
                checkedAt: DATA_DATE,
                note: "exact-model 官方單機限期優惠，可公開重現；已排除兩入組、搭售其他家電、贈品價值與濾網組。",
              },'''
          if old not in text:
              raise SystemExit("HJ10 historical-low patch target missing")
          text = text.replace(old, new)

          old = '''    image: "https://www.lg.com/content/dam/channel/wcms/tw/images/washing-machines/wd-s2220b/2010-1.jpg/jcr%3Acontent/renditions/thum-1600x1062.jpeg?w=800",
              price: {
                currency: "TWD",
                amount: 101900,
                converted: 101900,
                confidence: "雅光電器 2026-07-21 exact-model 尚有庫存公開價",
              },
              channel: "tw",
              buyLabel: "雅光電器",
              buyUrl: "https://www.yk01.com.tw/products/wds2220b",'''
          new = '''    image: "https://img.pchome.com.tw/cs/items/DPAI1LA900IXKBU/000007_1752484626.jpg",
              price: {
                currency: "TWD",
                amount: 92900,
                converted: 92900,
                confidence: "PChome 2026-07-21 exact-model 新品公開價",
              },
              channel: "tw",
              buyLabel: "PChome",
              buyUrl: "https://24h.pchome.com.tw/prod/DPAI1L-A900IXKBU",'''
          if old not in text:
              raise SystemExit("WD-S2220B price patch target missing")
          text = text.replace(old, new)

          old = '    historicalLow: historicalNotFound("TWD", "已查 LG 台灣官方頁、雅光現貨頁、燦坤預購頁與其他 exact-model 零售頁；較低價頁面含預購、活動已額滿或需另行詢問貨源，無法作為可重現的可信新品史低，因此維持找不到。"),'
          new = '    historicalLow: historicalNotFound("TWD", "已查 LG 台灣官方頁、PChome exact-model 新品頁、雅光現貨頁與其他零售頁；NT$92,900 可驗證為本輪可信新品現價，但仍缺少完整期間的可重現價格曲線。更低頁面含需詢問貨源或庫存不明條件，因此不直接宣稱為歷史最低價。"),'
          if old not in text:
              raise SystemExit("WD-S2220B historical-low note patch target missing")
          text = text.replace(old, new)

          old = '''    {
                id: "washerdryer-lg-wd-s2220b",
                sourceKind: "manual_exact_model",
                url: "https://www.yk01.com.tw/products/wds2220b",
                httpStatus: 200,
                status: "verified_available",
                title: "LG 洗22公斤+乾20公斤 WashTower AI 智控熱泵除濕滾筒洗乾衣機 WD-S2220B",
                exactModel: true,
                excludedCondition: false,
                quantity: null,
                price: 101900,
                currency: "TWD",
                image: "https://www.lg.com/content/dam/channel/wcms/tw/images/washing-machines/wd-s2220b/2010-1.jpg/jcr%3Acontent/renditions/thum-1600x1062.jpeg?w=800",
                evidence: [
                  "雅光電器 exact-model 頁明示 NT$101,900 與尚有庫存。",
                  "LG 台灣官方頁明示 22/20kg、700x1890x830mm、HeatPump、AI DD、AI Dry、智慧洗劑與 ThinQ。",
                ],
              },'''
          new = '''    {
                id: "washerdryer-lg-wd-s2220b",
                sourceKind: "manual_exact_model",
                url: "https://24h.pchome.com.tw/prod/DPAI1L-A900IXKBU",
                httpStatus: 200,
                status: "verified_available",
                title: "LG 洗22公斤+乾20公斤 WashTower AI 智控熱泵除濕滾筒洗乾衣機 WD-S2220B",
                exactModel: true,
                excludedCondition: false,
                quantity: null,
                price: 92900,
                currency: "TWD",
                image: "https://img.pchome.com.tw/cs/items/DPAI1LA900IXKBU/000007_1752484626.jpg",
                evidence: [
                  "PChome exact-model 新品頁明示 NT$92,900、加入購物車與立即購買。",
                  "LG 台灣官方頁明示 22/20kg、700x1890x830mm、HeatPump、AI DD、AI Dry、智慧洗劑與 ThinQ。",
                ],
              },'''
          if old not in text:
              raise SystemExit("WD-S2220B audit-row patch target missing")
          script_path.write_text(text.replace(old, new))

          expected_patched = "c31c534a3ac412b7ab8770602c5f616d71901581be8fcbe939360dbb130adc49"
          patched = script_path.read_bytes()
          patched_digest = hashlib.sha256(patched).hexdigest()
          if patched_digest != expected_patched:
              raise SystemExit(f"patched script digest mismatch: {patched_digest}")
          print(f"patched script bytes={len(patched)}, sha256={patched_digest}")
          Path("catalog-maintenance-debug.txt").unlink(missing_ok=True)
          PY

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Check maintenance script syntax
        run: node --check tools/.run-catalog-maintenance-2026-07-21.js

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Audit and update catalog
        env:
          TZ: Asia/Taipei
        run: node tools/.run-catalog-maintenance-2026-07-21.js

      - name: Remove temporary script
        run: rm tools/.run-catalog-maintenance-2026-07-21.js

      - name: Generate category pages
        run: npm run generate:categories

      - name: Validate and preserve results
        id: validation
        shell: bash
        run: |
          set +e
          npm run check > catalog-maintenance-check.log 2>&1
          check_code=$?
          ui_code=99
          quality_code=99
          if [ "$check_code" -eq 0 ]; then
            npm run check:ui:full > catalog-maintenance-ui-full.log 2>&1
            ui_code=$?
          fi
          if [ "$check_code" -eq 0 ] && [ "$ui_code" -eq 0 ]; then
            npm run check:quality > catalog-maintenance-quality.log 2>&1
            quality_code=$?
          fi
          git diff --check > catalog-maintenance-diff-check.log 2>&1
          diff_code=$?
          {
            echo "npm_run_check=$check_code"
            echo "npm_run_check_ui_full=$ui_code"
            echo "npm_run_check_quality=$quality_code"
            echo "git_diff_check=$diff_code"
          } > catalog-maintenance-validation.txt
          cat catalog-maintenance-validation.txt
          cat catalog-maintenance-check.log
          [ ! -f catalog-maintenance-ui-full.log ] || cat catalog-maintenance-ui-full.log
          [ ! -f catalog-maintenance-quality.log ] || cat catalog-maintenance-quality.log
          cat catalog-maintenance-diff-check.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "產生 7 月 21 日商品維護資料與驗證結果"
          git push origin HEAD:codex/2026-07-21-catalog-maintenance
          if [ "$check_code" -ne 0 ] || [ "$ui_code" -ne 0 ] || [ "$quality_code" -ne 0 ] || [ "$diff_code" -ne 0 ]; then
            exit 1
          fi
