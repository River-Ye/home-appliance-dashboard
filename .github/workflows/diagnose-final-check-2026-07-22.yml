name: Diagnose final catalog check

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    name: Show final check tail
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Run final check and print tail
        shell: bash
        run: |
          set -euo pipefail
          git clone --quiet --branch codex/2026-07-22-catalog-maintenance --single-branch https://github.com/River-Ye/home-appliance-dashboard.git repo
          cd repo
          node <<'NODE'
          const fs = require("fs");
          let index = fs.readFileSync("index.html", "utf8");
          index = index
            .replace('id="dataDate">2026-07-21</strong>', 'id="dataDate">2026-07-22</strong>')
            .replace("資料更新日為 2026-07-21。", "資料更新日為 2026-07-22。");
          fs.writeFileSync("index.html", index);
          let readme = fs.readFileSync("README.md", "utf8");
          readme = readme.replace(
            "- 2026-07-22 08:48（台灣時間；2026-07-21 00:48 UTC）",
            "- 2026-07-21 08:48（台灣時間；2026-07-21 00:48 UTC）",
          );
          fs.writeFileSync("README.md", readme);
          NODE
          npm ci > /tmp/npm-ci.log 2>&1
          set +e
          npm run check > /tmp/final-check.log 2>&1
          status=$?
          tail -n 80 /tmp/final-check.log
          exit "$status"
