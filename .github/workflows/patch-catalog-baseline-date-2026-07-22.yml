name: Patch catalog baseline date

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    name: Allow previous data date as baseline
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout maintenance branch
        uses: actions/checkout@v6
        with:
          ref: codex/2026-07-22-catalog-maintenance
          fetch-depth: 0

      - name: Patch baseline check and clean diagnostic workflows
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          workflow = Path(".github/workflows/catalog-maintenance-2026-07-22.yml")
          text = workflow.read_text()
          marker = '          text = text.replace("2026-07-21", "2026-07-22")\n'
          addition = '          text = text.replace("baseline.meta.dataDate !== DATA_DATE", \'baseline.meta.dataDate !== "2026-07-21"\')\n'
          if marker not in text:
              raise SystemExit("date replacement marker missing")
          if addition not in text:
              text = text.replace(marker, marker + addition, 1)
          workflow.write_text(text)
          PY
          rm -f .github/workflows/patch-catalog-baseline-date-2026-07-22.yml
          rm -f .github/workflows/patch-catalog-audit-log-2026-07-22.yml
          rm -f .github/workflows/diagnose-catalog-audit-2026-07-22.yml
          rm -f .github/workflows/diagnose-catalog-audit-tail-2026-07-22.yml
          rm -f .github/workflows/inspect-catalog-script-2026-07-22.yml
          rm -f .github/maintenance/trigger-patch-2026-07-22.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "修正每日維護的基準資料日期"
          git push origin HEAD:codex/2026-07-22-catalog-maintenance
