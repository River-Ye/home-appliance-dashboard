name: Catalog maintenance runner

on:
  push:
    branches:
      - "codex/daily-maintenance-*"

permissions:
  contents: write

concurrency:
  group: catalog-maintenance-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  maintain:
    name: Audit catalog and validate
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout maintenance branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve maintenance date
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_NAME}" =~ ^codex/daily-maintenance-([0-9]{4}-[0-9]{2}-[0-9]{2})(-[a-z0-9-]+)?$ ]]; then
            echo "MAINTENANCE_DATE=${BASH_REMATCH[1]}" >> "${GITHUB_ENV}"
          else
            echo "Unexpected maintenance branch: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: |
          npx playwright install-deps chromium
          npx playwright install chromium

      - name: Determine finalization readiness
        id: readiness
        shell: bash
        run: |
          node <<'NODE' >> "${GITHUB_OUTPUT}"
          const fs = require("fs");
          const report = fs.existsSync("catalog_maintenance_latest.json")
            ? JSON.parse(fs.readFileSync("catalog_maintenance_latest.json", "utf8"))
            : null;
          const { maintenanceReviewReady } = require("./tools/run-daily-catalog-maintenance");
          const categoryReady = maintenanceReviewReady(report, process.env.MAINTENANCE_DATE);
          console.log(`ready=${categoryReady ? "true" : "false"}`);
          NODE

      - name: Create audit draft pending manual review
        if: steps.readiness.outputs.ready != 'true'
        env:
          MAINTENANCE_CONCURRENCY: "16"
          MAINTENANCE_FETCH_TIMEOUT_MS: "15000"
        run: npm run maintain:catalog -- --draft --date="${MAINTENANCE_DATE}" --baseline-ref=origin/main

      - name: Run finalized catalog maintenance
        if: steps.readiness.outputs.ready == 'true'
        env:
          MAINTENANCE_CONCURRENCY: "16"
          MAINTENANCE_FETCH_TIMEOUT_MS: "15000"
        run: npm run maintain:catalog -- --write --date="${MAINTENANCE_DATE}" --baseline-ref=origin/main

      - name: Synchronize metadata and generated output
        if: steps.readiness.outputs.ready == 'true'
        run: |
          npm run sync:maintenance-metadata
          npm run generate:categories

      - name: Capture maintenance patch
        if: steps.readiness.outputs.ready == 'true'
        run: git diff --binary > maintenance.patch

      - name: Run repository checks
        run: |
          npm run check

      - name: Run full UI and quality checks
        if: steps.readiness.outputs.ready == 'true'
        run: |
          npm run check:ui:full
          npm run check:quality
          git diff --check

      - name: Upload raw audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalog-maintenance-audit-${{ env.MAINTENANCE_DATE }}
          path: |
            .maintenance-audit.json
            .maintenance-draft.json
            maintenance.patch
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

      - name: Commit audited changes
        if: success() && steps.readiness.outputs.ready == 'true'
        run: |
          set -euo pipefail
          rm -f .maintenance-audit.json maintenance.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No repository changes to commit."
            exit 0
          fi
          git commit -m "定期更新 ${MAINTENANCE_DATE} 商品資訊 [skip ci]"
          git push origin HEAD
