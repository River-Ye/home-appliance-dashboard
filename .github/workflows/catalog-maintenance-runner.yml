name: Catalog maintenance runner

on:
  push:
    branches:
      - "codex/daily-maintenance-*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: catalog-maintenance-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  maintain:
    name: Audit catalog and validate
    if: ${{ github.actor != 'github-actions[bot]' && startsWith(github.head_ref || github.ref_name, 'codex/daily-maintenance-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout maintenance branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Resolve maintenance date
        shell: bash
        run: |
          set -euo pipefail
          maintenance_branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          maintenance_date="${maintenance_branch#codex/daily-maintenance-}"
          if [[ ! "${maintenance_date}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Unexpected maintenance branch: ${maintenance_branch}" >&2
            exit 1
          fi
          echo "MAINTENANCE_DATE=${maintenance_date}" >> "${GITHUB_ENV}"

      - name: Ensure one-off maintenance tool exists
        run: test -f tools/run-daily-catalog-maintenance.js

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install Chromium
        run: npx playwright install chromium

      - name: Run full catalog maintenance
        env:
          MAINTENANCE_CONCURRENCY: "16"
          MAINTENANCE_FETCH_TIMEOUT_MS: "15000"
        run: node tools/run-daily-catalog-maintenance.js

      - name: Normalize exchange-rate timestamp
        run: |
          node <<'NODE'
          const fs = require("fs");
          const files = [
            "assets/js/config.js",
            "README.md",
            "AGENTS.md",
            ".maintenance-audit.json",
          ];
          const months = {
            Jan: "01", Feb: "02", Mar: "03", Apr: "04", May: "05", Jun: "06",
            Jul: "07", Aug: "08", Sep: "09", Oct: "10", Nov: "11", Dec: "12",
          };
          for (const file of files) {
            if (!fs.existsSync(file)) continue;
            const source = fs.readFileSync(file, "utf8").replace(
              /\b(\d{2}) (Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec) (\d{4}) (\d{2}:\d{2}) UTC\b/g,
              (_match, day, month, year, time) => `${year}-${months[month]}-${day} ${time} UTC`,
            );
            fs.writeFileSync(file, source, "utf8");
          }
          NODE

      - name: Regenerate category and GEO output
        run: npm run generate:categories

      - name: Capture maintenance patch
        run: git diff --binary > maintenance.patch

      - name: Check syntax
        run: npm run check:syntax

      - name: Check logic
        run: npm run check:logic

      - name: Check data
        run: npm run check:data

      - name: Check docs
        run: npm run check:docs

      - name: Check GEO
        run: npm run check:geo

      - name: Check UI
        run: npm run check:ui

      - name: Check Lighthouse quality budgets
        run: npm run check:quality

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalog-maintenance-audit-${{ env.MAINTENANCE_DATE }}
          path: |
            .maintenance-audit.json
            maintenance.patch
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

      - name: Commit audited changes
        if: success()
        run: |
          set -euo pipefail
          rm -f tools/run-daily-catalog-maintenance.js
          rm -f .github/workflows/catalog-maintenance-once.yml
          rm -f .maintenance-audit.json
          rm -f .maintenance-trigger
          rm -f maintenance.patch
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No repository changes to commit."
            exit 0
          fi
          git commit -m "定期更新 ${MAINTENANCE_DATE} 商品資訊 [skip ci]"
          git push origin HEAD
