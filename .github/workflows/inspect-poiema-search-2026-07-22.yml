name: Inspect POIEMA search count

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inspect:
    name: Print POIEMA catalog and UI counts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Inspect search result
        shell: bash
        run: |
          set -euo pipefail
          git clone --quiet --branch codex/2026-07-22-catalog-maintenance --single-branch https://github.com/River-Ye/home-appliance-dashboard.git repo
          cd repo
          npm ci > /tmp/npm-ci.log 2>&1
          npx playwright install --with-deps chromium > /tmp/playwright-install.log 2>&1
          node <<'NODE'
          const path = require("path");
          const { chromium } = require("playwright");
          const { readDashboardProducts } = require("./tools/read-dashboard-products");
          const products = readDashboardProducts(process.cwd()).products;
          const brandMatches = products.filter((product) => String(product.brand).toUpperCase() === "POIEMA");
          const textMatches = products.filter((product) => JSON.stringify(product).toUpperCase().includes("POIEMA"));
          console.log(JSON.stringify({
            total: products.length,
            brandCount: brandMatches.length,
            brandIds: brandMatches.map((product) => product.id),
            textCount: textMatches.length,
            textIds: textMatches.map((product) => product.id),
          }, null, 2));
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage({ viewport: { width: 2048, height: 1152 } });
            await page.goto(`file://${path.resolve("index.html")}`, { waitUntil: "domcontentloaded" });
            await page.waitForSelector(".product-card");
            await page.fill("#searchInput", "POIEMA");
            await page.waitForTimeout(2000);
            console.log(JSON.stringify({
              visibleCount: await page.locator("#visibleCount").textContent(),
              cards: await page.locator(".product-card").count(),
              cardTexts: await page.locator(".product-card").allTextContents(),
            }, null, 2));
            await browser.close();
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
