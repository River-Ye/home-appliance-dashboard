<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>家電採購比較表</title>
    <link rel="stylesheet" href="./styles.css?v=20260708-workspace1">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div>
          <p class="eyebrow">Home Appliance Shortlist</p>
          <h1>家電推薦比較工作台</h1>
          <p class="subhead">以台灣使用情境為主，整合台灣與海外通路價格、規格、優劣與購買連結。</p>
        </div>
        <div class="rate-card" aria-label="匯率與擷取資訊">
          <span>資料擷取</span>
          <strong>2026-07-08</strong>
          <small>可信通路低價查核；不採用不明網站。USD 1 = TWD 32.079；海外價未含國際運費、關稅與台灣保固。</small>
        </div>
      </div>
    </header>

    <main>
      <section id="filters" class="toolbar" aria-label="篩選器">
        <label class="search-field">
          <span>搜尋</span>
          <input id="searchInput" type="search" placeholder="品牌、型號、功能、適合對象">
        </label>
        <button id="filterToggle" class="filter-toggle" type="button" aria-expanded="false" aria-controls="advancedFilters">
          <span>篩選</span>
          <strong id="activeFilterCount" hidden>0</strong>
        </button>
        <div id="advancedFilters" class="filter-panel">
          <div class="combo-field">
            <label id="categoryInputLabel" for="categoryInput">分類</label>
            <div class="combo-control" data-combo="category">
              <input id="categoryInput" type="search" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="categoryOptions" aria-labelledby="categoryInputLabel" placeholder="搜尋分類">
              <button class="combo-button" type="button" aria-label="展開分類選項" tabindex="-1"></button>
              <div id="categoryOptions" class="combo-list" role="listbox" hidden></div>
            </div>
          </div>
          <div class="combo-field">
            <label id="brandInputLabel" for="brandInput">品牌</label>
            <div class="combo-control" data-combo="brand">
              <input id="brandInput" type="search" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="brandOptions" aria-labelledby="brandInputLabel" placeholder="搜尋品牌">
              <button class="combo-button" type="button" aria-label="展開品牌選項" tabindex="-1"></button>
              <div id="brandOptions" class="combo-list" role="listbox" hidden></div>
            </div>
          </div>
          <div class="combo-field">
            <label id="budgetInputLabel" for="budgetInput">預算</label>
            <div class="combo-control" data-combo="budget">
              <input id="budgetInput" type="search" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="budgetOptions" aria-labelledby="budgetInputLabel" placeholder="搜尋預算">
              <button class="combo-button" type="button" aria-label="展開預算選項" tabindex="-1"></button>
              <div id="budgetOptions" class="combo-list" role="listbox" hidden></div>
            </div>
          </div>
          <div class="combo-field">
            <label id="channelInputLabel" for="channelInput">通路</label>
            <div class="combo-control" data-combo="channel">
              <input id="channelInput" type="search" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="channelOptions" aria-labelledby="channelInputLabel" placeholder="搜尋通路">
              <button class="combo-button" type="button" aria-label="展開通路選項" tabindex="-1"></button>
              <div id="channelOptions" class="combo-list" role="listbox" hidden></div>
            </div>
          </div>
          <div class="combo-field">
            <label id="sortInputLabel" for="sortInput">排序</label>
            <div class="combo-control" data-combo="sort">
              <input id="sortInput" type="search" autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="sortOptions" aria-labelledby="sortInputLabel" placeholder="搜尋排序">
              <button class="combo-button" type="button" aria-label="展開排序選項" tabindex="-1"></button>
              <div id="sortOptions" class="combo-list" role="listbox" hidden></div>
            </div>
          </div>
          <button id="resetFilters" type="button" class="reset-button">重設篩選</button>
        </div>
      </section>

      <nav id="categoryTabs" class="tabs" aria-label="產品分類"></nav>

      <section class="summary-grid" aria-label="總覽">
        <article class="summary-card">
          <span>分類</span>
          <strong id="categoryCount">0</strong>
        </article>
        <article class="summary-card">
          <span>型號</span>
          <strong id="productCount">0</strong>
        </article>
        <article class="summary-card">
          <span>目前顯示</span>
          <strong id="visibleCount">0</strong>
        </article>
        <article class="summary-card">
          <span>比較清單</span>
          <strong id="compareCount">0</strong>
        </article>
      </section>

      <section id="topPicks" class="top-picks" aria-label="每類推薦"></section>

      <section id="productGrid" class="product-grid" aria-label="產品卡片"></section>

      <section id="comparePanel" class="compare-panel" aria-label="比較清單">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Compare</p>
            <h2>比較清單</h2>
          </div>
          <button id="clearCompare" type="button" class="ghost-button">清空</button>
        </div>
        <div id="compareTable" class="compare-table-wrap"></div>
      </section>
    </main>

    <footer>
      <p>價格為 2026-07-08 於可信通路查核的低價參考；排除不明網站、個人拍賣、福利品、展示機、拆封品、二手品與配件誤判。實際到手價以購買頁為準，海外商品需自行確認電壓、插頭、保固與進口成本。</p>
    </footer>

    <nav class="mobile-dock" aria-label="手機快速操作">
      <a href="#filters">篩選</a>
      <a href="#productGrid">商品 <strong id="mobileVisibleCount">0</strong></a>
      <a id="mobileCompareLink" href="#comparePanel">比較 <strong id="mobileCompareCount">0</strong></a>
    </nav>

    <script src="./app.js?v=20260708-split1"></script>
    <script src="./products/tv.js?v=20260708-split1"></script>
    <script src="./products/soundbar.js?v=20260708-split1"></script>
    <script src="./products/fan.js?v=20260708-split1"></script>
    <script src="./products/circulator.js?v=20260708-split1"></script>
    <script src="./products/dehumidifier.js?v=20260708-split1"></script>
    <script src="./products/purifier.js?v=20260708-split1"></script>
    <script src="./products/robot.js?v=20260708-split1"></script>
    <script src="./products/vacuum.js?v=20260708-split1"></script>
    <script src="./products/wifi.js?v=20260708-split1"></script>
    <script src="./products/standingdesk.js?v=20260708-split1"></script>
    <script src="./products/chair.js?v=20260708-split1"></script>
    <script src="./products/monitor.js?v=20260708-split1"></script>
    <script src="./products/blender.js?v=20260708-split1"></script>
    <script src="./products/oven.js?v=20260708-split1"></script>
    <script src="./products/bidet.js?v=20260708-split1"></script>
    <script src="./products/smartlock.js?v=20260708-split1"></script>
  </body>
</html>
